name: Build Cerberus IDE — Windows

# Manuel tetiklenir (Actions sekmesinden "Run workflow"). Çıkan installer
# her runda "artifact" olarak iner; kalıcı release istiyorsan workflow
# tamamlandıktan sonra elle `gh release create` veya panele upload yap.

on:
  workflow_dispatch:
    inputs:
      vscode_arch:
        description: 'Architecture'
        required: true
        default: 'x64'
        type: choice
        options: [x64, arm64]

permissions:
  contents: read

jobs:
  build:
    name: Windows ${{ inputs.vscode_arch }}
    runs-on: windows-2022
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    env:
      VSCODE_QUALITY: stable
      OS_NAME: windows
      VSCODE_ARCH: ${{ inputs.vscode_arch }}
      SHOULD_BUILD: 'yes'
      SHOULD_BUILD_REH: 'no'
      SHOULD_BUILD_REH_WEB: 'no'
      DISABLE_UPDATE: 'yes'
      CI_BUILD: 'no'
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      # MSI'yi atla — VSCodium'un wxs şablonu hâlâ VSCODIUM.EXE ismini
      # arıyor, brand patch'i Cerberus için tam çalışmıyor. Inno Setup
      # .exe ve portable .zip yeterli.
      SHOULD_BUILD_MSI: 'no'
      SHOULD_BUILD_MSI_NOUP: 'no'
      # VS Code preinstall.ts requires this env var on windows runners.
      # windows-2022 ships VS 2022 BuildTools at this fixed path.
      vs2022_install: 'C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tooling
        shell: bash
        run: |
          choco install --no-progress --confirm jq 7zip innosetup
          echo "${ProgramFiles}/Inno Setup 6" >> $GITHUB_PATH

      - name: Load brand env
        shell: bash
        run: |
          # brand.env'i source et — bash quote'ları doğru çözer.
          # Sonra ilgili değişkenleri GITHUB_ENV'a quote'suz yaz.
          set -a
          source brand.env
          set +a
          for key in APP_NAME BINARY_NAME ORG_NAME GH_REPO_PATH ASSETS_REPOSITORY TUNNEL_APP_NAME \
                     CERBERUS_HOMEPAGE_URL CERBERUS_DOCS_URL CERBERUS_AI_API_BASE_URL; do
            value="${!key:-}"
            if [[ -n "$value" ]]; then
              echo "${key}=${value}" >> "$GITHUB_ENV"
            fi
          done
          echo "Brand loaded:"
          grep -E '^(APP_NAME|BINARY_NAME|ORG_NAME|GH_REPO_PATH|CERBERUS_AI_API_BASE_URL)=' "$GITHUB_ENV" || true

      - name: Fetch upstream VS Code source
        shell: bash
        run: |
          ./get_repo.sh

      - name: Build Cerberus
        shell: bash
        run: |
          ./build.sh

      - name: Package installer + zip
        shell: bash
        run: |
          ./prepare_assets.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-windows-${{ inputs.vscode_arch }}
          path: |
            assets/*.exe
            assets/*.zip
            assets/*.msi
          if-no-files-found: error
          retention-days: 14
